<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepVision Technologies | Assessment Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header text-center">
            <h1>DeepVision Technologies</h1>
            <p>Online MCQ Assessment System</p>
        </header>

        <main class="card form-container">
            <h2>Candidate Information</h2>
            <p class="subtitle">Please fill in your details to begin the assessment.</p>
            
            <form id="candidate-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" required placeholder="Enter your 10-digit mobile number" pattern="[0-9]{10}">
                </div>
                
                <div class="form-group">
                    <label for="college">College Name</label>
                    <input type="text" id="college" required placeholder="Enter your college name">
                </div>
                
                <div class="form-group">
                    <label for="degree">Degree</label>
                    <input type="text" id="degree" required placeholder="e.g. B.Tech, B.Sc, MCA">
                </div>
                
                <div class="form-group">
                    <label for="gradYear">Graduation Year</label>
                    <input type="number" id="gradYear" required placeholder="e.g. 2024" min="2000" max="2030">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Start Assessment</button>
                </div>
            </form>
        </main>
    </div>
    
    <footer style="text-align: center; padding: 2rem; color: #64748b; font-size: 0.875rem;">
        DeepVision Technologies, Satara, Maharashtra, India 415001
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
